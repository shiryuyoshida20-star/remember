    margin-bottom: 12px;

    box-shadow: 0 1px 3px rgba(60,45,20,0.08);

    display:flex;
    align-items:center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .tab{

    min-width: 30px;
    height: 30px;

    background: var(--red);

    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size: 12px;
    padding: 0 6px;

  .card-title{
    flex: 1;
    font-weight: 700;
    font-size: 14.5px;
    color: var(--ink);
  }
  .badge{
    flex-shrink:0;
    font-size: 10px;
    font-weight:700;
    padding: 3px 7px;
    border-radius: 20px;

  .badge.no{ color: var(--badge-no); background: var(--badge-no-bg); }

    flex-shrink:0;

    height: 18px;
    transition: transform 0.25s ease;
    color: var(--ink-soft);
  }
  .card.open .chevron{ transform: rotate(180deg); }

    max-height: 0;
    overflow: hidden;
    transition: max-height 0.28s ease;
    padding: 0 14px;
  }
  .card.open .card-body{ padding-bottom: 14px; }

    font-size: 12px;
    font-weight: 700;
    color: var(--red-dark);
    margin: 10px 0 4px;
    display:flex;
    align-items:center;
    gap: 5px;
  }

  ul.bullets{ margin: 0; padding-left: 18px; }
  ul.bullets li{ margin-bottom: 7px; }

  .blank{
    display: inline;
    background: var(--red);
    color: transparent;
    border-radius: 3px;
    padding: 0 2px;

    transition: background 0.12s ease, color 0.12s ease;
  }
  .blank.revealed{
    background: transparent;
    color: var(--red-dark);
    font-weight: 700;
  }
  .blank:active{ filter: brightness(0.9); }

  footer{
    text-align:center;
    font-size: 10.5px;
    color: var(--ink-soft);
    padding: 18px 20px 4px;
  }

  .hint-note{
    max-width: 640px;
    margin: 12px auto 0;
    padding: 0 14px;
    font-size: 11.5px;
    color: var(--ink-soft);
    text-align:center;
  }

  .view{ display:none; }
  .view.active{ display:block; }
</style>
</head>

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function parseInline(text){
  const parts = text.split(/(\*\*[^*]+\*\*)/g).filter(p => p.length > 0);
  return parts.map(p => {
    if(p.startsWith("**") && p.endsWith("**")){
      const inner = p.slice(2, -2);
      return `<span class="blank" data-state="hidden">${escapeHtml(inner)}</span>`;
    }
    return escapeHtml(p);
  }).join("");
}

function renderHome(){
  headerTitle.textContent = "暗記帳ハブ";
  headerSub.textContent = "科目を選んでタップ学習";
  backBtn.classList.remove("show");
  deckToolbar.style.display = "none";
  hintNote.textContent = "科目カードをタップして開く";

  homeView.innerHTML = DECKS.map((deck, i) => {
    const testedCount = deck.sections.filter(s => s.tested).length;
    return `
      <div class="deck-card" data-deck="${i}">
        <div class="deck-emblem">${deck.name.slice(0,1)}</div>
        <div class="deck-info">
          <div class="name">${escapeHtml(deck.name)}</div>
          <div class="sub">${escapeHtml(deck.subtitle)}　・　全${deck.sections.length}回（確認テスト反映 ${testedCount}回）</div>
        </div>
        <div class="deck-arrow">›</div>
      </div>
    `;
  }).join("") + `<div class="add-note">＋ 新しい科目の資料をClaudeに渡すと、ここに追加していけます</div>`;

  homeView.querySelectorAll(".deck-card").forEach(el => {
    el.addEventListener("click", () => openDeck(parseInt(el.dataset.deck, 10)));
  });

  homeView.classList.add("active");
  deckView.classList.remove("active");
}

function openDeck(deckIdx){
  const deck = DECKS[deckIdx];
  headerTitle.textContent = deck.name;
  headerSub.textContent = deck.subtitle;
  backBtn.classList.add("show");
  deckToolbar.style.display = "flex";
  hintNote.textContent = "赤い部分をタップで解答表示／見出しタップで開閉";

  deckView.innerHTML = deck.sections.map((section, idx) => `
    <div class="card">
      <div class="card-head" data-idx="${idx}">
        <div class="tab">${idx+1}</div>
        <div class="card-title">${escapeHtml(section.title)}</div>
        <div class="badge ${section.tested ? 'ok' : 'no'}">${section.tested ? '確認テスト反映' : '講義内容のみ'}</div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="card-body">
        <div class="sub">核心（定義・学説）</div>
        <ul class="bullets">
          ${section.core.map(t => `<li>${parseInline(t)}</li>`).join("")}
        </ul>
        <div class="sub">具体例・キーワード</div>
        <ul class="bullets">
          ${section.kw.map(t => `<li>${parseInline(t)}</li>`).join("")}
        </ul>
      </div>
    </div>
  `).join("");

  deckView.querySelectorAll(".card-head").forEach(head => {
    head.addEventListener("click", () => {
      const card = head.closest(".card");
      const body = card.querySelector(".card-body");
      const isOpen = card.classList.contains("open");
      if(isOpen){
        body.style.maxHeight = null;
        card.classList.remove("open");
      } else {
        card.classList.add("open");
        body.style.maxHeight = body.scrollHeight + "px";
      }
    });
  });

  deckView.querySelectorAll(".blank").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      el.classList.toggle("revealed");
      const body = el.closest(".card-body");
      if(body && body.parentElement.classList.contains("open")){
        body.style.maxHeight = body.scrollHeight + "px";
      }
    });
  });

  homeView.classList.remove("active");
  deckView.classList.add("active");
  window.scrollTo(0,0);
}

backBtn.addEventListener("click", renderHome);

document.getElementById("revealAllBtn").addEventListener("click", () => {
  deckView.querySelectorAll(".blank").forEach(el => el.classList.add("revealed"));
  deckView.querySelectorAll(".card.open .card-body").forEach(b => b.style.maxHeight = b.scrollHeight + "px");
});
document.getElementById("hideAllBtn").addEventListener("click", () => {
  deckView.querySelectorAll(".blank").forEach(el => el.classList.remove("revealed"));
  deckView.querySelectorAll(".card.open .card-body").forEach(b => b.style.maxHeight = b.scrollHeight + "px");
});
document.getElementById("expandAllBtn").addEventListener("click", (e) => {
  const cards = deckView.querySelectorAll(".card");
  const allOpen = cards.length > 0 && cards.length === deckView.querySelectorAll(".card.open").length;
  cards.forEach(card => {
    const body = card.querySelector(".card-body");
    if(allOpen){
      card.classList.remove("open");
      body.style.maxHeight = null;
    } else {
      card.classList.add("open");
      body.style.maxHeight = body.scrollHeight + "px";
    }
  });
  e.target.textContent = allOpen ? "全部開く" : "全部閉じる";
});

renderHome();
</script>
</body>
</html>
